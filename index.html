<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Sudsy</title>
    <style>
        body { margin:0; background:#0a0a1f; overflow:hidden; font-family:Arial; }
        canvas { display:block; margin:10px auto; border:6px solid #ffd700; border-radius:12px; }
        .controls {
            position:fixed; bottom:20px; left:0; right:0; display:flex; justify-content:space-between; padding:0 20px; z-index:100;
        }
        .btn {
            width:80px; height:80px; background:rgba(255,215,0,0.3); border:5px solid #ffd700;
            border-radius:50%; color:white; font-size:40px; display:flex; align-items:center; justify-content:center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="controls" id="controls">
        <div style="display:flex; gap:15px;">
            <div class="btn" id="left">←</div>
            <div class="btn" id="right">→</div>
        </div>
        <div class="btn" id="jump" style="background:rgba(0,221,255,0.4); border-color:#00ddff;">↑</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = Math.min(window.innerWidth - 20, 800);
            canvas.height = 450;
        }
        resize();
        window.addEventListener('resize', resize);

        let x = 100, y = 300, dx = 0, dy = 0, grounded = true;
        let touchLeft = false, touchRight = false;

        // Controls
        document.getElementById('left').addEventListener('touchstart', () => touchLeft = true);
        document.getElementById('left').addEventListener('touchend', () => touchLeft = false);
        document.getElementById('right').addEventListener('touchstart', () => touchRight = true);
        document.getElementById('right').addEventListener('touchend', () => touchRight = false);
        document.getElementById('jump').addEventListener('touchstart', () => {
            if (grounded) { dy = -15; grounded = false; }
        });

        function update() {
            // Movement
            if (touchRight || keys && keys['KeyD']) dx = 6;
            else if (touchLeft || keys && keys['KeyA']) dx = -6;
            else dx *= 0.8;

            dy += 0.8;           // gravity
            x += dx;
            y += dy;

            if (y > canvas.height - 80) {
                y = canvas.height - 80;
                dy = 0;
                grounded = true;
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = '#555';
            ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

            // Player
            ctx.fillStyle = '#00ccff';
            ctx.fillRect(x, y, 60, 80);

            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText('Super Sudsy Test', 20, 40);
        }

        // Keyboard support
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        update();   // Start the game
    </script>
</body>
</html>
