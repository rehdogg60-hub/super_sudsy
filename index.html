<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Sudsy</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a1f;
            overflow: hidden;
            font-family: 'Arial Black', Arial, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            border: 6px solid #ffd700;
            border-radius: 12px;
            box-shadow: 0 0 40px #ffd700;
        }
        .controls {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            pointer-events: none;
        }
        .btn {
            pointer-events: all;
            background: rgba(255, 215, 0, 0.3);
            color: white;
            border: 5px solid #ffd700;
            border-radius: 50%;
            width: 78px;
            height: 78px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            backdrop-filter: blur(8px);
        }
        .jump {
            background: rgba(0, 221, 255, 0.35);
            border-color: #00ddff;
        }
    </style>
</head>
