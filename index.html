<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Sudsy - Reh Dogg Games Plus</title>
    <style>
        body {
            margin: 0;
            background: #0a0a1f;
            overflow: hidden;
            font-family: 'Arial Black', Arial, sans-serif;
        }
        canvas {
            display: block;
            margin: 10px auto;
            border: 8px solid #ffd700;
            border-radius: 16px;
            box-shadow: 0 0 50px #ffd700, 0 0 80px #00ddff;
            max-width: 100%;
        }
        .arcade-frame {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 14px solid #ffd700;
            border-image: linear-gradient(#ffd700, #ff00ff, #00ffff) 1;
            pointer-events: none;
            z-index: 5;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 0; right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        .btn {
            background: rgba(255,215,0,0.25);
            color: white;
            border: 4px solid #ffd700;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            user-select: none;
        }
        .jump-btn {
            background: rgba(0,221,255,0.35);
            border-color: #00ddff;
        }
        @media (max-width: 900px) {
            .controls { display: flex; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="arcade-frame"></div>

    <!-- Mobile Controls -->
    <div class="controls" id="mobileControls">
        <div style="display:flex; gap:15px;">
            <div class="btn" id="leftBtn">←</div>
            <div class="btn" id="rightBtn">→</div>
        </div>
        <div class="btn jump-btn" id="jumpBtn">↑</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900;
        canvas.height = 500;

        let gameState = "title"; // title, playing, gameover

        // Audio
        let audioCtx;
        let musicMuted = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (musicMuted || gameState !== "playing") return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            switch(type) {
                case "jump": osc.type = "sawtooth"; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.3); gain.gain.value = 0.4; break;
                case "stomp": osc.type = "square"; osc.frequency.setValueAtTime(180, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.2); gain.gain.value = 0.6; break;
                case "hurt": osc.type = "sawtooth"; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.6); gain.gain.value = 0.5; break;
                case "powerup": osc.type = "sine"; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.4); gain.gain.value = 0.5; break;
                case "shoot": osc.type = "square"; osc.frequency.setValueAtTime(650, audioCtx.currentTime); gain.gain.value = 0.25; break;
            }
            osc.start();
            osc.stop(audioCtx.currentTime + 0.7);
        }

        // Player & Game Objects
        const player = { x: 100, y: 300, width: 80, height: 110, dx: 0, dy: 0, speed: 6, jumpPower: -15,
            grounded: false, invincible: false, invincibleTime: 0, health: 3 };

        const playerImg = new Image();
        playerImg.src = 'rehdogg-hero.PNG';

        let score = 0;
        let highScore = 0;

        const platforms = [
            { x: 0, y: canvas.height - 60, width: canvas.width * 0.6, height: 60 },
            { x: 650, y: canvas.height - 180, width: 250, height: 30 },
            { x: 200, y: canvas.height - 250, width: 180, height: 25 },
            { x: 450, y: canvas.height - 320, width: 140, height: 25 },
        ];

        let enemies = [];
        let projectiles = [];
        let powerups = [];
        let speedBoost = 1;
        let boostTimer = 0;

        const keys = {};

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyM') musicMuted = !musicMuted;
            if ((gameState === "title" || gameState === "gameover") && e.code === 'Space') resetGame();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Mobile Controls
        let touchLeft = false, touchRight = false;
        function setupMobile() {
            const leftBtn = document.getElementById('leftBtn');
            const rightBtn = document.getElementById('rightBtn');
            const jumpBtn = document.getElementById('jumpBtn');
            const mobileControls = document.getElementById('mobileControls');

            if (window.innerWidth < 900) mobileControls.style.display = 'flex';

            leftBtn.addEventListener('touchstart', e=>{e.preventDefault(); touchLeft=true;});
            leftBtn.addEventListener('touchend', ()=>{touchLeft=false;});
            rightBtn.addEventListener('touchstart', e=>{e.preventDefault(); touchRight=true;});
            rightBtn.addEventListener('touchend', ()=>{touchRight=false;});
            jumpBtn.addEventListener('touchstart', e=>{e.preventDefault(); if(player.grounded){player.dy=player.jumpPower; player.grounded=false; playSound("jump");}});
        }

        function resetGame() {
            player.x = 100; player.y = 300; player.health = 3; player.dx = 0; player.dy = 0;
            score = 0; speedBoost = 1;
            projectiles = [];
            enemies = [ /* same enemies as before */ 
                { x: 320, y: 380, width: 55, height: 55, dx: -2.2, type: "patrol", color: "#8B4513", health: 1, alive: true },
                { x: 720, y: 300, width: 52, height: 52, dx: 2.8, type: "chaser", color: "#9F1239", health: 1, alive: true, charge: 0 },
                { x: 520, y: 220, width: 48, height: 48, dx: -1.8, type: "shooter", color: "#4F46E5", health: 1, alive: true, attackCooldown: 70 },
                { x: 400, y: 120, width: 50, height: 45, dx: 2.5, dy: 0, type: "flyer", color: "#7C3AED", health: 1, alive: true, attackCooldown: 50 },
                { x: 180, y: 380, width: 65, height: 65, dx: -1.1, type: "tank", color: "#166534", health: 3, alive: true },
            ];
            powerups = [
                { x: 280, y: 200, width: 40, height: 50, active: true, type: "speed" },
                { x: 720, y: 150, width: 40, height: 50, active: true, type: "score" },
                { x: 480, y: 280, width: 40, height: 50, active: true, type: "speed" },
            ];
            gameState = "playing";
        }

        function drawTitleScreen() {
            ctx.fillStyle = '#0a0a1f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 14;
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 30;
            ctx.strokeRect(35, 35, canvas.width-70, canvas.height-70);

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#00ffff';
            ctx.font = 'bold 26px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('REH DOGG GAMES PLUS ARCADE', canvas.width/2, 85);

            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 78px Arial';
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 40;
            ctx.fillText('SUPER SUDSY', canvas.width/2, 195);

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 28px Arial';
            ctx.fillText('SUDS UP THE CITY', canvas.width/2, 255);

            // Start Button
            ctx.fillStyle = '#ff8800';
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 25;
            ctx.fillRect(canvas.width/2 - 190, 300, 380, 78);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 0;
            ctx.font = 'bold 38px Arial';
            ctx.fillText('START GAME', canvas.width/2, 350);

            ctx.fillStyle = '#bbbbbb';
            ctx.font = '22px Arial';
            ctx.fillText('A/D or ←→ Move • SPACE / TAP = Jump', canvas.width/2, 430);
        }

        function drawHUD() {
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 30, 45);
            
            ctx.textAlign = 'right';
            ctx.fillText(`HEALTH: ${player.health} ❤️`, canvas.width - 30, 45);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === "title") {
                drawTitleScreen();
                return;
            }

            if (gameState === "gameover") {
                ctx.fillStyle = 'rgba(0,0,0,0.9)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 70px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, 180);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 36px Arial';
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width/2, 260);
                ctx.fillText('PRESS SPACE TO RESTART', canvas.width/2, 340);
                return;
            }

            // Gameplay background & platforms
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // ... (add your platforms, enemies, projectiles, player drawing code here) ...

            drawHUD();
        }

        // Update function and all game logic (same as previous versions)
        // ... paste your full update(), updateEnemies(), updateProjectiles() etc. here ...

        setupMobile();
        playerImg.onload = () => draw();
        draw();
    </script>
</body>
</html>
